name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  test-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit Tests
        run: npm test

      - name: Coverage
        run: npm run test:coverage

      - name: Build
        run: npm run build

      - name: Package
        run: npm run package

      - name: Upload Coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage
          if-no-files-found: error

      - name: Upload Extension Package
        uses: actions/upload-artifact@v4
        with:
          name: sourced-release
          path: releases/*.zip
          if-no-files-found: error
